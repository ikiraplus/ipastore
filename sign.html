<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>توقيع التطبيقات | ipastore</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #0d1117; color: #c9d1d9; text-align: center; padding: 40px 20px; margin: 0; }
        .container { max-width: 450px; margin: auto; background: #161b22; padding: 30px; border-radius: 12px; border: 1px solid #30363d; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        h2 { color: #58a6ff; margin-bottom: 5px; }
        p { font-size: 14px; color: #8b949e; margin-bottom: 25px; }
        label { display: block; text-align: right; margin: 15px 0 5px; font-weight: bold; font-size: 14px; }
        input[type="file"], input[type="password"] { width: 100%; padding: 12px; box-sizing: border-box; border-radius: 6px; border: 1px solid #30363d; background: #0d1117; color: #c9d1d9; }
        input[type="file"]::file-selector-button { background: #238636; color: white; border: none; padding: 8px 12px; border-radius: 4px; cursor: pointer; margin-left: 10px; }
        button { width: 100%; padding: 14px; background: #238636; color: #ffffff; border: none; border-radius: 6px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 25px; transition: 0.2s; }
        button:hover { background: #2ea043; }
        button:disabled { background: #21262d; color: #8b949e; cursor: not-allowed; }
        #status { margin-top: 20px; font-size: 14px; font-weight: bold; }
        .hidden { display: none; }
        #installBtn { background: #1f6feb; }
        #installBtn:hover { background: #388bfd; }
    </style>
</head>
<body>

<div class="container">
    <h2>توقيع تطبيق IPA </h2>
    <p>ارفع التطبيق والشهادة لتوقيعه وتثبيته مباشرة</p>

    <form id="signForm">
        <label>1. ملف التطبيق (.ipa)</label>
        <input type="file" id="ipaFile" accept=".ipa" required>

        <label>2. ملف الشهادة (.p12)</label>
        <input type="file" id="p12File" accept=".p12" required>

        <label>3. ملف التوفير (.mobileprovision)</label>
        <input type="file" id="provFile" accept=".mobileprovision" required>

        <label>4. باسورد الشهادة</label>
        <input type="password" id="certPassword" placeholder="اكتب الباسورد هنا..." required>

        <button type="submit" id="signBtn">بدء التوقيع</button>
    </form>

    <div id="status"></div>
    
    <a id="installLink" href="#" class="hidden">
        <button id="installBtn">تثبيت التطبيق الآن ⬇️</button>
    </a>
</div>

<script>
    document.getElementById('signForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const statusDiv = document.getElementById('status');
        const signBtn = document.getElementById('signBtn');
        const installLink = document.getElementById('installLink');

        // تغيير شكل الواجهة عند بدء الرفع
        installLink.classList.add('hidden');
        signBtn.disabled = true;
        statusDiv.innerHTML = "جاري رفع الملفات وتوقيع التطبيق... يرجى الانتظار ⏳";
        statusDiv.style.color = "#f2cc60";

        // محاكاة للتجربة (لأننا لم نربط السيرفر بعد)
        setTimeout(() => {
            statusDiv.innerHTML = "هذه واجهة تجريبية! لم نقم بربط السيرفر الخلفي بعد. ⚠️";
            statusDiv.style.color = "#ff7b72";
            signBtn.disabled = false;
        }, 2500);
    });
</script>

</body>
</html>
